<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="google-site-verification" content="F0H00iwYOLOhDnPtIDwTxjW1QdTYBvjySB1HTcwJsGE" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
  <link rel="icon" type="image/x-icon" href="{{ '/assets/favicon/favicon.ico' | relative_url }}" />
  <link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/favicon/favicon-16x16.png' | relative_url }}" />
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/favicon/favicon-32x32.png' | relative_url }}" />
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/favicon/apple-touch-icon.png' | relative_url }}" />
  <link rel="manifest" href="{{ '/site.webmanifest' | relative_url }}" />
  {% feed_meta %}
  {% seo %}
</head>
<body>

  <header class="site-header">
    <div class="container">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">home</a>
        <a href="{{ '/archive' | relative_url }}">archive</a>
        <a href="{{ '/about' | relative_url }}">about</a>
      </nav>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <span>© {{ site.time | date: '%Y' }} {{ site.author }}</span>
      <div class="footer-links">
        <a href="{{ '/feed.xml' | relative_url }}">rss</a>
        <a href="https://github.com/pathsec" target="_blank" rel="noopener">github</a>
      </div>
    </div>
  </footer>

  <script>
    var btn = document.querySelector('.nav-toggle');
    var nav = document.querySelector('.site-nav');
    btn.addEventListener('click', function() {
      var open = nav.classList.toggle('is-open');
      btn.setAttribute('aria-expanded', open);
    });
  </script>
</body>
</html>
